name: release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build & Release Binaries (Linux, Windows, macOS)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: sudo curl -fL https://github.com/bazelbuild/buildtools/releases/download/v6.3.3/buildozer-linux-amd64 -o /usr/bin/buildozer && sudo chmod +x /usr/bin/buildozer
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-disk-cache
          key: ${{runner.os}}-bazel-cache
      - uses: actions/checkout@v5

      # 1. Build and copy release binaries
      - name: Build and Copy Release Binaries
        run: |
          bazelisk run //:copy_release_binaries

      # 2. Upload all compiled binaries to the release
      - name: Upload Release Assets
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/bzlmod-linux-x86_64 dist/bzlreg-linux-x86_64 \
            dist/bzlmod-windows-x86_64.exe dist/bzlreg-windows-x86_64.exe \
            dist/bzlmod-macos-x86_64 dist/bzlreg-macos-x86_64 \
            dist/bzlmod-macos-aarch64 dist/bzlreg-macos-aarch64
        env:
          GH_TOKEN: ${{ github.token }}

